version: "3.9"

services:
  backend:
    env_file:
      - ./backend/.env.production
    environment:
      APP_ENV: production
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce_analytics
      REDIS_URL: redis://redis:6379
    restart: always
    ports:
      - "4000:4000"

  postgres:
    environment:
      POSTGRES_DB: ecommerce_analytics
    restart: always
    ports: []
    volumes:
      - postgres_production_data:/var/lib/postgresql/data

  redis:
    restart: always
    ports: []
    volumes:
      - redis_production_data:/data

volumes:
  postgres_production_data:
  redis_production_data:
