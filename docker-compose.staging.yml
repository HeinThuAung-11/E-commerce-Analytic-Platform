version: "3.9"

services:
  backend:
    env_file:
      - ./backend/.env.staging
    environment:
      APP_ENV: staging
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ecommerce_analytics_staging
      REDIS_URL: redis://redis:6379
    ports:
      - "4400:4000"

  postgres:
    environment:
      POSTGRES_DB: ecommerce_analytics_staging
    ports:
      - "5434:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data

  redis:
    ports:
      - "6380:6379"
    volumes:
      - redis_staging_data:/data

volumes:
  postgres_staging_data:
  redis_staging_data:
